<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- Основное приложение -->
        <div id="messenger" style="display:none">
            <!-- Боковая панель (ноутбук) / Нижняя панель (телефон) -->
            <div class="sidebar" id="sidebar">
                <div class="avatar-large" id="avatarBtn">
                    <img id="avatarImg" src="" alt="Avatar">
                </div>
                <h3 id="userLogin"></h3>
                <nav>
                    <button id="feedBtn">📰 Лента</button>
                    <button id="friendsBtn">👥 Друзья</button>
                    <button id="searchBtn">🔍 Поиск</button>
                    <button id="chatsBtn">💬 Чаты</button>
                    <button id="logoutBtn">🚪 Выход</button>
                </nav>
            </div>

            <!-- Основной контент -->
            <div class="main-content">
                <div id="feed" class="feed">
                    <div class="create-post">
                        <textarea id="postText" placeholder="Что нового?"></textarea>
                        <input type="file" id="postImage" accept="image/*">
                        <button id="createPostBtn">Опубликовать</button>
                    </div>
                    <div id="postsList"></div>
                </div>

                <div id="friends" style="display:none">
                    <h2>Мои друзья</h2>
                    <div id="friendsList"></div>
                </div>

                <div id="search" style="display:none">
                    <h2>Поиск пользователей</h2>
                    <input type="text" id="searchInput" placeholder="Логин...">
                    <button id="doSearch">Найти</button>
                    <div id="searchResults"></div>
                </div>

                <div id="chats" style="display:none">
                    <h2>Чаты</h2>
                    <div id="chatsList"></div>
                    <div id="chatWindow" style="display:none">
                        <div id="chatMessages"></div>
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendMsgBtn">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка редактирования профиля -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Редактировать профиль</h3>
            <input type="text" id="editLogin" placeholder="Новый логин">
            <input type="password" id="editPassword" placeholder="Новый пароль">
            <input type="file" id="editAvatar" accept="image/*">
            <button id="saveProfileBtn">Сохранить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
