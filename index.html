<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Premium Sport — Telegram Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f12;
            color: #e4e4e7;
        }

        /* Telegram Premium Theme */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        }

        /* ========== SIDEBAR (DESKTOP) ========== */
        .sidebar {
            width: 280px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo-area {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .shop-title {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #6c63ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .shop-sub {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 4px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-nav a {
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 14px;
            color: #a1a1aa;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.95rem;
        }

        .sidebar-nav a:hover {
            background: rgba(108, 99, 255, 0.1);
            color: #c4b5fd;
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, #6c63ff, #4c3ffc);
            color: white;
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
        }

        /* ========== MOBILE BOTTOM NAV ========== */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 26, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 20px;
            justify-content: space-around;
            z-index: 1000;
        }

        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            font-size: 11px;
            color: #71717a;
            font-weight: 500;
            transition: 0.2s;
        }

        .bottom-nav a.active {
            color: #6c63ff;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            padding: 28px 32px;
            max-width: calc(100% - 280px);
        }

        /* Search & Filter */
        .search-header {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 44px;
            padding: 6px 18px;
        }

        .search-row input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 0.95rem;
            outline: none;
            color: #fff;
        }

        .search-row input::placeholder {
            color: #52525b;
        }

        .filter-icon {
            background: rgba(108, 99, 255, 0.15);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: #c4b5fd;
        }

        .categories-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .cat-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #a1a1aa;
        }

        .cat-badge.active, .cat-badge:hover {
            background: #6c63ff;
            color: white;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: rgba(108, 99, 255, 0.4);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        .card-img {
            height: 200px;
            position: relative;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:hover .card-img img {
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
            color: white;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .sale-badge {
            background: linear-gradient(135deg, #ffb347, #ff7e05);
        }

        .brand-tag {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .card-content {
            padding: 18px;
        }

        .price-line {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .current-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #6c63ff;
        }

        .old-price {
            font-size: 0.8rem;
            text-decoration: line-through;
            color: #6b7280;
        }

        .product-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 8px 0 6px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 8px 0;
            color: #fbbf24;
            font-size: 0.8rem;
        }

        .stock {
            font-size: 0.7rem;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-bottom: 14px;
        }

        .btn {
            background: linear-gradient(135deg, #6c63ff, #4c3ffc);
            border: none;
            width: 100%;
            padding: 12px;
            color: white;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-card {
            background: #1c1c24;
            border-radius: 32px;
            padding: 32px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(108, 99, 255, 0.3);
        }

        .cart-item, .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
        }

        .admin-table th, .admin-table td {
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            text-align: left;
        }

        input, select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            outline: none;
            width: 100%;
            margin: 8px 0;
        }

        .notification {
            position: fixed;
            top: 80px;
            right: 24px;
            background: #1e1e2a;
            border-left: 4px solid #6c63ff;
            padding: 14px 20px;
            border-radius: 16px;
            z-index: 3000;
            animation: slideRight 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .status-pending { background: #f97316; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .status-completed { background: #22c55e; padding: 4px 10px; border-radius: 20px; font-size: 11px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { max-width: 100%; padding: 20px; margin-bottom: 70px; }
            .bottom-nav { display: flex; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo-icon">✨</div>
            <div class="shop-title">Premium Sport</div>
            <div class="shop-sub">TELEGRAM PREMIUM SHOP</div>
        </div>
        <div class="sidebar-nav">
            <a href="#" data-page="shop" class="active">🏬 Магазин</a>
            <a href="#" data-page="cart">🛍️ Корзина <span id="cartCountSide" style="margin-left:auto;">0</span></a>
            <a href="#" data-page="profile">👤 Telegram ID</a>
        </div>
        <div style="margin-top: auto; text-align: center; font-size: 11px; color:#52525b;">⭐ Premium Quality ⭐</div>
    </div>

    <div class="main-content">
        <div id="shopPage">
            <div class="search-header">
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="Поиск по магазину...">
                    <div class="filter-icon">🔍</div>
                </div>
                <div class="categories-row" id="categoriesList"></div>
                <div style="margin-top: 16px;">
                    <select id="sizeFilter" style="width: auto; display: inline-block; width: 130px;">
                        <option value="">Все размеры</option>
                        <option>S</option><option>M</option><option>L</option><option>XL</option>
                    </select>
                </div>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <div id="cartPage" style="display: none;">
            <h2 style="margin-bottom: 20px;">🛍️ Корзина</h2>
            <div id="cartItemsList"></div>
            <div id="cartTotal" style="font-size: 1.5rem; font-weight: bold; margin: 20px 0;"></div>
            <button id="checkoutBtn" class="btn" style="background: linear-gradient(135deg, #22c55e, #16a34a);">💎 Оплатить через Telegram Stars / ЮMoney</button>
        </div>

        <div id="profilePage" style="display: none;">
            <div style="background: rgba(108,99,255,0.1); border-radius: 32px; padding: 32px; text-align: center;">
                <div style="font-size: 64px;">👤</div>
                <h2>Вход в Premium Shop</h2>
                <div id="authStatus" style="margin: 16px 0; color:#a1a1aa;"></div>
                <input type="text" id="loginName" placeholder="Telegram Username">
                <input type="password" id="loginPass" placeholder="Пароль">
                <button id="doLoginBtn" class="btn" style="margin-bottom: 12px;">Войти</button>
                <button id="doRegBtn" style="background: transparent; border: 1px solid #6c63ff;">Зарегистрироваться</button>
                <button id="logoutBtn" style="background: #dc2626; display: none; margin-top: 12px;">Выйти</button>
                <div id="userInfo" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div id="adminPage" style="display: none;">
            <h2>⚡ Premium Admin Panel</h2>
            <div style="background: rgba(108,99,255,0.1); border-radius: 24px; padding: 20px; margin: 20px 0;">
                <h3>📦 Заказы клиентов</h3>
                <div id="ordersList"></div>
            </div>
            <div id="adminNotifications" style="margin: 16px 0;"></div>
            <button id="addProductBtn" class="btn" style="width: auto; padding: 10px 24px; margin-bottom: 20px;">➕ Добавить товар</button>
            <div id="adminProductsList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" data-page="shop" class="active">🏠 Shop</a>
        <a href="#" data-page="cart">🛒 Cart <span id="cartCountMobile">0</span></a>
        <a href="#" data-page="profile">👤 Profile</a>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-card">
        <h3>✨ Оплата Premium</h3>
        <p id="paymentAmount" style="margin: 16px 0;"></p>
        <input type="text" id="yooMoneyNumber" placeholder="Telegram Stars / ЮMoney кошелёк">
        <input type="text" id="yooPassword" placeholder="Подтверждение">
        <button id="confirmPaymentBtn" class="btn">Оплатить</button>
        <button id="closePaymentBtn" style="background: transparent; margin-top: 12px;">Отмена</button>
    </div>
</div>

<script>
    // PREMIUM PRODUCTS
    let products = [
        { id: 1, name: "Nike Air Max 213", price: 500, oldPrice: null, rating: 5, reviews: 7, image: "https://images.unsplash.com/photo-1542291026-7eec264cff27?w=300&h=200&fit=crop", brand: "Nike", badge: "New", sizes: ["S","M","L"], category: "shoes" },
        { id: 2, name: "Nike Air Max 90 Premium", price: 1500, oldPrice: 1999, rating: 5, reviews: 7, image: "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=300&h=200&fit=crop", brand: "Nike", badge: "🔥 Hot", sizes: ["M","L","XL"], category: "shoes" },
        { id: 3, name: "Футболка Dri-FIT Elite", price: 1500, oldPrice: null, rating: 5, reviews: 4, image: "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=300&h=200&fit=crop", brand: "Adidas", badge: null, sizes: ["S","M","L"], category: "t-shirts" },
        { id: 4, name: "Adidas 72 Limited", price: 1899, oldPrice: 2499, rating: 4, reviews: 12, image: "https://images.unsplash.com/photo-1518002171953-a080ee817e1f?w=300&h=200&fit=crop", brand: "Adidas", badge: "-25% SALE", sizes: ["L","XL"], category: "suits" },
        { id: 5, name: "Nike Tech Fleece Premium", price: 3450, oldPrice: null, rating: 5, reviews: 23, image: "https://images.unsplash.com/photo-1556906781-9a412961c28c?w=300&h=200&fit=crop", brand: "Nike", badge: "⭐ Premium", sizes: ["M","L"], category: "suits" },
        { id: 6, name: "Puma Future Suit", price: 2900, oldPrice: 3900, rating: 4, reviews: 9, image: "https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=300&h=200&fit=crop", brand: "Puma", badge: "SALE", sizes: ["S","M","XL"], category: "suits" }
    ];

    let cart = [];
    let currentUser = null;
    let orders = [];
    let adminNotifications = [];

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'notification';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    function addAdminNotification(msg) {
        adminNotifications.unshift({ msg, time: new Date().toLocaleTimeString() });
        if(currentUser?.login === 'admin') renderAdminNotifications();
        else showToast("🔔 Новое уведомление для админа");
    }

    function renderAdminNotifications() {
        let container = document.getElementById("adminNotifications");
        if(!container) return;
        if(adminNotifications.length === 0) { container.innerHTML = "📭 Нет уведомлений"; return; }
        container.innerHTML = adminNotifications.slice(0,5).map(n => `<div style="background:#2d2d3a; padding:8px 12px; border-radius:12px; margin-bottom:6px;">🕒 ${n.time} — ${n.msg}</div>`).join('');
    }

    function renderOrders() {
        let container = document.getElementById("ordersList");
        if(!container) return;
        if(orders.length === 0) { container.innerHTML = "<p style='color:#71717a;'>Нет заказов</p>"; return; }
        let html = `<table class="admin-table"><thead><tr><th>ID</th><th>Клиент</th><th>Товары</th><th>Сумма</th><th>Статус</th><th>Действие</th></tr></thead><tbody>`;
        orders.forEach(o => {
            let itemsText = o.items.map(i => `${i.name} x${i.quantity}`).join(", ");
            html += `<tr>
                        <td>#${o.id}</td><td>${o.customer}</td><td>${itemsText}</td><td>${o.total}₽</td>
                        <td><span class="${o.status === 'completed' ? 'status-completed' : 'status-pending'}">${o.status === 'completed' ? '✅ Готов' : '⏳ Новый'}</span></td>
                        <td>${o.status !== 'completed' ? `<button class="confirmOrderBtn" data-id="${o.id}" style="background:#6c63ff; border:none; padding:6px 12px; border-radius:20px;">✔️ Подтвердить</button>` : '—'}</td>
                     </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
        document.querySelectorAll('.confirmOrderBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = parseInt(btn.dataset.id);
                let order = orders.find(o => o.id === id);
                if(order && order.status !== 'completed') {
                    order.status = 'completed';
                    renderOrders();
                    addAdminNotification(`✅ Заказ #${id} подтверждён, сумма ${order.total}₽`);
                    showToast(`Заказ #${id} выполнен`);
                }
            });
        });
    }

    function renderAdminProducts() {
        let container = document.getElementById("adminProductsList");
        if(!container) return;
        let html = `<h3>📦 Товары магазина</h3><table class="admin-table"><thead><tr><th>Фото</th><th>Название</th><th>Цена</th><th>Действие</th></tr></thead><tbody>`;
        products.forEach(p => {
            html += `<tr>
                        <td><img src="${p.image}" width="45" height="45" style="border-radius:12px; object-fit:cover;"></td>
                        <td>${p.name}</td>
                        <td>${p.price}₽</td>
                        <td><button class="deleteAdminProduct" data-id="${p.id}" style="background:#dc2626; border:none; padding:4px 12px; border-radius:20px;">Удалить</button></td>
                     </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
        document.querySelectorAll('.deleteAdminProduct').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = parseInt(btn.dataset.id);
                if(confirm("Удалить товар?")) {
                    products = products.filter(p => p.id !== id);
                    renderAdminProducts();
                    renderProducts();
                    addAdminNotification(`🗑️ Товар ID ${id} удалён`);
                }
            });
        });
    }

    function renderProducts() {
        let container = document.getElementById("productsGrid");
        let search = document.getElementById("searchInput")?.value.toLowerCase() || "";
        let size = document.getElementById("sizeFilter")?.value || "";
        let filtered = products.filter(p => p.name.toLowerCase().includes(search));
        if(size) filtered = filtered.filter(p => p.sizes.includes(size));
        container.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div class="card-img">
                    <img src="${p.image}" alt="${p.name}">
                    ${p.badge ? `<div class="badge ${p.badge.includes('SALE') ? 'sale-badge' : ''}">${p.badge}</div>` : ''}
                    <div class="brand-tag">${p.brand}</div>
                </div>
                <div class="card-content">
                    <div class="price-line"><span class="current-price">${p.price}₽</span>${p.oldPrice ? `<span class="old-price">${p.oldPrice}₽</span>` : ''}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="rating">★★★★★ ${p.reviews} отзывов</div>
                    <div class="stock">✅ В наличии</div>
                    <button class="addCartBtn" data-id="${p.id}" class="btn">В корзину</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.addCartBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = parseInt(btn.dataset.id);
                let product = products.find(p => p.id === id);
                let exist = cart.find(i => i.id === id);
                if(exist) exist.quantity++;
                else cart.push({ ...product, quantity: 1 });
                updateCartUI();
                showToast(`✅ ${product.name} добавлен`);
            });
        });
    }

    function updateCartUI() {
        let totalItems = cart.reduce((s,i) => s + i.quantity, 0);
        document.getElementById("cartCountSide").innerText = totalItems;
        document.getElementById("cartCountMobile").innerText = totalItems;
        let cartContainer = document.getElementById("cartItemsList");
        let totalSpan = document.getElementById("cartTotal");
        if(cart.length === 0) {
            cartContainer.innerHTML = "<p style='color:#71717a;'>Корзина пуста</p>";
            totalSpan.innerText = "Итого: 0₽";
            return;
        }
        let total = 0;
        let html = "";
        cart.forEach((item, idx) => {
            total += item.price * item.quantity;
            html += `<div class="cart-item"><span><b>${item.name}</b> x${item.quantity}</span><span>${item.price * item.quantity}₽</span><button class="removeCart" data-index="${idx}" style="background:#ef4444; border:none; padding:6px 12px; border-radius:30px;">✖️</button></div>`;
        });
        cartContainer.innerHTML = html;
        totalSpan.innerText = `Итого: ${total}₽`;
        document.querySelectorAll('.removeCart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.dataset.index);
                cart.splice(idx,1);
                updateCartUI();
            });
        });
    }

    function createOrder(customer, items, total) {
        let newOrder = { id: orders.length + 1, customer, items: [...items], total, date: new Date().toLocaleString(), status: "pending" };
        orders.push(newOrder);
        renderOrders();
        addAdminNotification(`🛍️ НОВЫЙ ЗАКАЗ от ${customer} на сумму ${total}₽`);
    }

    // Modal payment
    let currentTotal = 0;
    document.getElementById("checkoutBtn")?.addEventListener("click", () => {
        if(!currentUser) { showToast("⚠️ Войдите в аккаунт"); showPage("profile"); return; }
        if(cart.length === 0) { showToast("Корзина пуста"); return; }
        currentTotal = cart.reduce((s,i) => s + i.price * i.quantity, 0);
        document.getElementById("paymentAmount").innerHTML = `Сумма: <strong style="font-size:24px;">${currentTotal}₽</strong><br>Оплата Telegram Stars / ЮMoney`;
        document.getElementById("paymentModal").style.display = "flex";
    });
    document.getElementById("confirmPaymentBtn")?.addEventListener("click", () => {
        let wallet = document.getElementById("yooMoneyNumber").value;
        if(!wallet) { alert("Введите данные кошелька"); return; }
        createOrder(currentUser.login, cart.map(i => ({ name: i.name, quantity: i.quantity, price: i.price })), currentTotal);
        cart = [];
        updateCartUI();
        document.getElementById("paymentModal").style.display = "none";
        showToast("✨ Оплата прошла успешно! Спасибо за покупку");
        showPage("shop");
    });
    document.getElementById("closePaymentBtn")?.addEventListener("click", () => document.getElementById("paymentModal").style.display = "none");

    // Auth
    let users = [{ login: "admin", password: "admin123" }];
    function login(login, pass) { let user = users.find(u => u.login === login && u.password === pass); if(user) { currentUser = user; updateAuth(); if(login === 'admin') { showPage("admin"); addAdminNotification("👑 Админ вошёл"); } else showPage("shop"); return true; } return false; }
    function register(login, pass) { if(users.find(u => u.login === login)) return false; users.push({ login, password: pass }); return true; }
    function logout() { currentUser = null; updateAuth(); showPage("shop"); }
    function updateAuth() {
        let status = document.getElementById("authStatus");
        let userInfo = document.getElementById("userInfo");
        let logoutBtn = document.getElementById("logoutBtn");
        if(currentUser) {
            status.innerText = `✅ Добро пожаловать, ${currentUser.login}`;
            userInfo.innerHTML = `<div style="background:#2d2d3a; padding:12px; border-radius:20px;">⭐ Premium статус: активен</div>`;
            logoutBtn.style.display = "block";
        } else {
            status.innerText = "🔐 Войдите в Premium аккаунт";
            userInfo.innerHTML = "";
            logoutBtn.style.display = "none";
        }
    }

    function showPage(page) {
        document.getElementById("shopPage").style.display = page === "shop" ? "block" : "none";
        document.getElementById("cartPage").style.display = page === "cart" ? "block" : "none";
        document.getElementById("profilePage").style.display = page === "profile" ? "block" : "none";
        let adminDiv = document.getElementById("adminPage");
        if(page === "admin") {
            if(currentUser?.login === "admin") { adminDiv.style.display = "block"; renderAdminProducts(); renderOrders(); renderAdminNotifications(); }
            else { alert("Premium Admin access only"); showPage("profile"); return; }
        } else adminDiv.style.display = "none";
        document.querySelectorAll('.sidebar-nav a, .bottom-nav a').forEach(link => { link.classList.remove('active'); if(link.getAttribute('data-page') === page) link.classList.add('active'); });
    }

    // Event listeners
    document.querySelectorAll('.sidebar-nav a, .bottom-nav a').forEach(link => {
        link.addEventListener('click', (e) => { e.preventDefault(); let p = link.getAttribute('data-page'); if(p === 'admin' && currentUser?.login !== 'admin') alert("Premium Admin only"); else showPage(p); });
    });
    document.getElementById("doLoginBtn")?.addEventListener("click", () => { let l = document.getElementById("loginName").value; let p = document.getElementById("loginPass").value; if(login(l,p)) showToast("Добро пожаловать в Premium!"); else alert("Неверные данные"); });
    document.getElementById("doRegBtn")?.addEventListener("click", () => { let l = document.getElementById("loginName").value; let p = document.getElementById("loginPass").value; if(register(l,p)) alert("Регистрация успешна!"); else alert("Логин занят"); });
    document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
    document.getElementById("addProductBtn")?.addEventListener("click", () => { let n = prompt("Название"); let pr = prompt("Цена"); if(n && pr) { products.push({ id: Date.now(), name: n, price: parseInt(pr), oldPrice: null, rating: 5, reviews: 0, image: "https://via.placeholder.com/300x200?text=Premium", brand: "Premium", badge: "New", sizes: ["M","L"], category: "new" }); renderAdminProducts(); renderProducts(); addAdminNotification(`➕ Товар ${n} добавлен`); } });
    document.getElementById("searchInput")?.addEventListener("input", () => renderProducts());
    document.getElementById("sizeFilter")?.addEventListener("change", () => renderProducts());

    renderProducts();
    updateCartUI();
    updateAuth();
    showPage("shop");
</script>
</body>
</html>
